<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}novel-reader{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #faf8f5;
      --bg-card:   #ffffff;
      --border:    #e4e0d8;
      --text:      #2c2a26;
      --text-muted:#7a7570;
      --accent:    #7c5c3a;
      --accent-lt: #f3ece3;
      --new:       #d97706;
      --unread:    #2563eb;
      --reading:   #059669;
      --completed: #9ca3af;
      --star-on:   #f59e0b;
      --danger:    #dc2626;
    }

    body {
      font-family: "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      min-height: 100vh;
    }

    /* ナビゲーション */
    .nav {
      background: var(--accent);
      color: #fff;
      padding: 0 1.5rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
      height: 52px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav a { color: #fff; text-decoration: none; font-size: 0.9rem; opacity: 0.85; }
    .nav a:hover { opacity: 1; }
    .nav .brand { font-size: 1.05rem; font-weight: 700; opacity: 1; letter-spacing: .04em; }

    /* メインコンテンツ */
    .main { max-width: 900px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }

    /* カード */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1rem;
    }
    .card:hover { border-color: var(--accent); }

    /* バッジ */
    .badge {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 1px 7px;
      border-radius: 20px;
      vertical-align: middle;
      margin-left: 6px;
    }
    .badge-new      { background: var(--new);     color: #fff; }
    .badge-unread   { background: var(--unread);  color: #fff; }
    .badge-reading  { background: var(--reading); color: #fff; }
    .badge-completed{ background: var(--completed); color: #fff; }

    /* 進捗バー */
    .progress-bar-wrap {
      background: var(--border);
      border-radius: 4px;
      height: 6px;
      margin-top: 8px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: var(--reading);
      border-radius: 4px;
      transition: width .3s;
    }

    /* 見出し */
    h1 { font-size: 1.5rem; margin-bottom: 1.5rem; }
    h2 { font-size: 1.2rem; margin-bottom: 1rem; color: var(--accent); border-bottom: 2px solid var(--accent-lt); padding-bottom: .4rem; }
    h3 { font-size: 1.05rem; }

    /* テキスト補助 */
    .muted { color: var(--text-muted); font-size: 0.85rem; }
    .meta  { color: var(--text-muted); font-size: 0.82rem; margin-top: 4px; }

    /* ボタン */
    .btn {
      display: inline-block;
      padding: .45rem 1.1rem;
      border-radius: 5px;
      font-size: 0.9rem;
      cursor: pointer;
      border: none;
      text-decoration: none;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { opacity: .88; }
    .btn-outline { background: transparent; border: 1px solid var(--accent); color: var(--accent); }
    .btn-outline:hover { background: var(--accent-lt); }

    /* セクション区切り */
    .section-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .08em;
      margin: 2rem 0 .75rem;
    }

    /* リンク */
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <nav class="nav">
    <a href="/" class="brand">novel-reader</a>
    <a href="/">一覧</a>
  </nav>
  <main class="main">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
